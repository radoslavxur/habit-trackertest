<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>My habits</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-canvas">
        <header class="header">
            <div class="header-top">
                <span class="status-pill">Системата е активна</span>
                <span class="date">Сряда, 25 Март</span>
            </div>
            <div class="hero">
                <h1>Здравей, <span class="italic"> Name.</span></h1>
                <p class="subtitle">Всичко е под контрол.</p>
                <button id="theme-toggle">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M480-120q-150 0-255-105T120-480q0-150 105-255t255-105q14 0 27.5 1t26.5 3q-41 29-65.5 75.5T444-660q0 90 63 153t153 63q55 0 101-24.5t75-65.5q2 13 3 26.5t1 27.5q0 150-105 255T480-120Z"/></svg>
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="M338.5-338.5Q280-397 280-480t58.5-141.5Q397-680 480-680t141.5 58.5Q680-563 680-480t-58.5 141.5Q563-280 480-280t-141.5-58.5ZM200-440H40v-80h160v80Zm720 0H760v-80h160v80ZM440-760v-160h80v160h-80Zm0 720v-160h80v160h-80ZM256-650l-101-97 57-59 96 100-52 56Zm492 496-97-101 53-55 101 97-57 59Zm-98-550 97-101 59 57-100 96-56-52ZM154-212l101-97 55 53-97 101-59-57Z"/></svg>
                </button>
            </div>
            
            <div class="stats-overview">
                <div class="stat-item">
                    <span class="label">Общ прогрес</span>
                    <div class="stat-row">
                        <span class="value">0%</span>
                        <div class="mini-progress"><div class="fill" style="width: 0%"></div></div>
                    </div>
                </div>
            </div>
        </header>

        <section class="rituals-section">
            <div class="section-title">
                <h2>Дневни задачи</h2>
                <span class="count">5 задачи</span>
            </div>

            <div class="ritual-grid">
                <article class="ritual-card" style="display:none">
                    <div class="card-inner">
                        <div class="card-head">
                            <div class="icon-box"></div>
                            <div class="title-group">
                                <h3>Хидратация</h3>
                                <p>8 дни серия</p>
                            </div>
                            <div class="action-group">
                                <button class="delete-btn" title="Премахни">×</button>
                                <button class="check-box completed"></button>
                            </div>
                        </div>
                        
                        <div class="habit-calendar">
                            <div class="day-col"><span class="day-name">Пн</span><div class="dot filled"></div></div>
                            <div class="day-col"><span class="day-name">Вт</span><div class="dot filled"></div></div>
                            <div class="day-col"><span class="day-name">Ср</span><div class="dot active"></div></div>
                            <div class="day-col"><span class="day-name">Чт</span><div class="dot"></div></div>
                            <div class="day-col"><span class="day-name">Пт</span><div class="dot"></div></div>
                            <div class="day-col"><span class="day-name">Сб</span><div class="dot"></div></div>
                            <div class="day-col"><span class="day-name">Нд</span><div class="dot"></div></div>
                        </div>
                    </div>
                </article>
            </div>
        </section>

        <footer class="action-bar">
            <div class="input-capsule">
                <input type="text" placeholder="Добави новa задача..." spellcheck="false" id="habitInput">
                <button class="add-btn">Добави</button>
            </div>
        </footer>
    </div>


    <script src="index.js" charset="utf-8"></script>
</body>
</html>
